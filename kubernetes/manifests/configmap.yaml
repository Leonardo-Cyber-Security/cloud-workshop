apiVersion: v1
kind: ConfigMap
metadata:
    name: seminario-config
    namespace: workshop
data:
    appsettings.json: |
        {
            "Logging": {
                "LogLevel": {
                    "Default": "Information",
                    "Microsoft": "Warning",
                    "Microsoft.Hosting.Lifetime": "Information"
                }
            },
            "AllowedHosts": "*"
        }